    const slides = [
        { title: "Cozette—my love", text: "You turned every ephemeral moment we share into something that stays forever—your benevolent heart makes even the seconds feel like the sweetest, most lasting of my life.", img: "img1.jpg", bg: "#d2b48c" },
        { title: "MY FOREVER LOVE", text: "Love wouldn’t be easy if we weren’t ready for this moment. You inspire me in so many ways just seeing you around I feel alive. My heart is happy, and you’re the reason. You’re indelible. As long you love me this heart is yours forever.", img: "img2.jpg", bg: "#c4a484" },
        { title: "THE LAST PIECE OF MY LIFE", text: "May I court you, again. Cozette?", img: "img3.jpg", bg: "#b89778" }
    ];
    
    let i = 0;

    // Gamitin natin ang addEventListener para siguradong gagana ang click
    document.addEventListener('DOMContentLoaded', () => {
        const btn = document.querySelector('button');
        btn.addEventListener('click', () => {
            i = (i + 1) % slides.length;
            document.getElementById('title').innerText = slides[i].title;
